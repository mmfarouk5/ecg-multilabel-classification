# ============================================================
# ECG Classification — CNN-LSTM Hybrid Configuration
# ============================================================

data:
  raw_dir: "data/raw/ptb-xl-a-large-publicly-available-electrocardiography-dataset-1.0.1"
  processed_dir: "data/processed"
  sampling_rate: 100
  label_type: "diagnostic_superclass"

preprocessing:
  bandpass:
    lowcut: 0.5
    highcut: 40.0
    order: 4
  baseline_wander:
    cutoff: 0.5
    order: 4
  outlier_clip_percentile: 99
  normalize: true

split:
  val_fold: 9
  test_fold: 10
  n_kfolds: 5
  seed: 42

model:
  name: "cnn_lstm"
  input_channels: 12
  num_classes: 5
  params:
    cnn_filters: 64
    n_cnn_blocks: 3
    kernel_size: 7
    lstm_hidden: 128
    lstm_layers: 2
    dropout: 0.3

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: "weighted_bce"
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_params:
    T_max: 50
    eta_min: 0.00001
  focal_loss_params:
    alpha: 1.0
    gamma: 2.0
  amp: false                     # LSTM component can have AMP issues
  gradient_clip: 1.0
  num_workers: 4
  pin_memory: true

  early_stopping:
    enabled: true
    monitor: "val_loss"
    patience: 10
    min_delta: 0.001
    mode: "min"
    restore_best_weights: true

output:
  dir: "outputs"
  figures_dir: "outputs/figures"
  logs_dir: "outputs/logs"
  models_dir: "outputs/models"
  results_dir: "outputs/results"

experiment:
  name: "cnn_lstm"
  seed: 42
  use_tensorboard: true
  use_wandb: false
