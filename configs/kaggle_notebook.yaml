# ============================================================
# ECG Classification — Kaggle Notebook Configuration
# ============================================================
# Focused on a single, reliable Kaggle run:
# - uses the strongest model in this repo snapshot (leadwise_cnn)
# - keeps training short enough for notebook use
# - disables optional extras that are not needed for a first run

data:
  raw_dir: "/kaggle/input/datasets/khyeh0719/ptb-xl-dataset/ptb-xl-a-large-publicly-available-electrocardiography-dataset-1.0.1"
  processed_dir: "data/processed"
  sampling_rate: 100
  label_type: "diagnostic_superclass"

preprocessing:
  bandpass:
    lowcut: 0.5
    highcut: 40.0
    order: 4
  baseline_wander:
    cutoff: 0.5
    order: 4
  outlier_clip_percentile: 99
  normalize: true

split:
  val_fold: 9
  test_fold: 10
  n_kfolds: 5
  seed: 42

model:
  name: "leadwise_cnn"
  input_channels: 12
  num_classes: 5
  params:
    base_filters: 32
    n_blocks: 3
    kernel_size: 7
    dropout: 0.3

training:
  epochs: 12
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: "asymmetric_focal"
  optimizer: "adamw"
  scheduler: "cosine"
  scheduler_params:
    T_max: 12
    eta_min: 0.00001
  asymmetric_focal_loss_params:
    gamma_pos: 1.0
    gamma_neg: 4.0
    clip: 0.05
  amp: true
  gradient_clip: 1.0
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

  early_stopping:
    enabled: true
    monitor: "val_f1_macro"
    patience: 4
    min_delta: 0.0001
    mode: "max"
    restore_best_weights: true

output:
  dir: "outputs"
  figures_dir: "outputs/figures"
  logs_dir: "outputs/logs"
  models_dir: "outputs/models"
  results_dir: "outputs/results"

experiment:
  name: "kaggle_leadwise_cnn"
  seed: 42
  deterministic: false
  use_tensorboard: false
  use_wandb: false
