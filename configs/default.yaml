# ============================================================
# ECG Multi-Label Classification — Default Configuration
# ============================================================

data:
  raw_dir: "data/raw/ptb-xl-a-large-publicly-available-electrocardiography-dataset-1.0.1"
  processed_dir: "data/processed"
  sampling_rate: 100            # 100 or 500
  label_type: "diagnostic_superclass"  # diagnostic_superclass | diagnostic_subclass | all

preprocessing:
  bandpass:
    lowcut: 0.5
    highcut: 40.0
    order: 4
  baseline_wander:
    cutoff: 0.5
    order: 4
  outlier_clip_percentile: 99
  normalize: true               # Z-score normalization per lead

split:
  val_fold: 9                   # PTB-XL strat_fold used for validation
  test_fold: 10                 # PTB-XL strat_fold used for test
  n_kfolds: 5
  seed: 42

model:
  name: "cnn_1d"                # cnn_1d | leadwise_cnn | resnet | lstm | transformer | cnn_lstm | cnn_transformer
  input_channels: 12
  num_classes: 5                # 5 diagnostic superclasses
  params: {}

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: "asymmetric_focal"      # weighted_bce | focal | asymmetric_focal
  optimizer: "adamw"              # adam | adamw | sgd
  scheduler: "cosine"           # cosine | step | plateau
  scheduler_params:
    T_max: 50
    eta_min: 0.00001
  focal_loss_params:
    alpha: 1.0
    gamma: 2.0
  asymmetric_focal_loss_params:
    gamma_pos: 1.0
    gamma_neg: 4.0
    clip: 0.05
  amp: true                     # automatic mixed precision
  gradient_clip: 1.0
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  class_aware_sampling:
    enabled: false

  early_stopping:
    enabled: true
    monitor: "val_f1_macro"      # val_loss | val_f1_macro
    patience: 10
    min_delta: 0.0001            # minimum improvement to count as progress
    mode: "max"                  # min (for loss) | max (for metrics like F1)
    restore_best_weights: true

output:
  dir: "outputs"
  figures_dir: "outputs/figures"
  logs_dir: "outputs/logs"
  models_dir: "outputs/models"
  results_dir: "outputs/results"

experiment:
  name: "default"
  seed: 42
  deterministic: true
  use_tensorboard: true
  use_wandb: false
